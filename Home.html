<!DOCTYPE html> 
<html lang="en">

<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祁煜和月月的情侶空間</title>
    <link rel="stylesheet" href="web.css">
    <style> 
        *{
            margin: 0;
            padding: 0;
            list-style: none;
            text-decoration: none;
        }
        .nav{
            height: 40px;
            width: 1200px;
            margin: 0 auto;
            margin-top: 30px;
            border-radius: 10cm;
            background-color: white;
            box-shadow: 20px 40px 40px #00000033;
            padding: 10px;

        }
        .navlist li{
            position: relative;
            float: left;
            height: 40px;
            width: 300px;
            line-height: 40px;
            justify-content: center;
            text-align: center;
        }

        .navlist a{
            color: #3f569b;
            display: block;
            border-radius: 10cm;
            font: 500 24px '芫荽';
        }

        .navlist{
            width: 800px;
            margin: auto;
        }

        .navlist a:hover {
            background: #c2d3fd;
        }

        .card{
            position: relative;
            width: 300px;
            height: 350px;
            margin: 20px auto;
            border-radius: 20px;
            transition: 0.5s;
            transition-delay: 0.5s;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .card:hover {
            width: 600px;
            transition-delay: 0s;
        }
        .card .circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card .circle::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: var(--clr);
            clip-path: circle(120px at center);
            transform: 0.5s;
        }
       
        .card:hover .circle::before {
            clip-path: circle(400px at center);
        }

        .card .circle .logo {
            position: relative;
            width: 200px;
            transition: 0.5s;
            transition-delay: 0.5s;
        }

        .card:hover .circle .logo {
            transform: scale(0);
            transition-delay: 0s;
        }

        .content {
            position: relative;
            width: 50%;
            left: 20%;
            padding: 20px 20px 20px 40px;
            opacity: 0;
            transition: 0.5s;
            visibility: hidden;
        }

        .card:hover .content {
            left: 0;
            opacity: 1;
            visibility: visible;
            transition-delay: 0.5s;
        }

        .content h2{
            color: white;
            font-size: 2.5em;
            line-height: 1em;
            text-transform: uppercase;
        }

        .content p{
            color: white;
        }

        .content a {
            position: relative;
            color: #111;
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 10px;
            display: inline-block;
            text-decoration: none;
            font-weight: 500;
        }

        .card .product_img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            height: 500px;
            transition: 0.3s;
            transition-delay: 0s;
        }

        .card:hover .product_img {
            left: 72%;
            transform: translate(-50%, -50%) scale(1);
            transition-delay: 0.5s;
        }


    </style>
</head>
<body> 
    <div class="nav">

        <div class="content">

            <a href="https://www.instagram.com/jellyfish.in.autumn?igsh=N3BwM2xoMmYyNmF5">Follow Me!</a>
        </div>
        <img src="photo/album48.png" class="product_img">
    </div>

    <div class="card">
        <div class="circle" style="--clr:#b7a8d6">
            <img src="photo/album40.png" class="logo">
        </div>
        <div class="content">

        </div>

    </div>

</body>
</html>
